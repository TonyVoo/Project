<!DOCTYPE html>
<html lang="en">
<head>
    <title>View CSV Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center">Dataset Overview</h2>

        <div class="row">
            <!-- Raw Data Table -->
            <div class="col-md-6">
                <h4 class="text-center">Raw Data</h4>
                <div class="table-responsive">
                    {{ raw_table|safe }}
                </div>
            </div>

            <!-- Preprocessed Data Table -->
            <div class="col-md-6">
                <h4 class="text-center">Preprocessed Data</h4>
                <div class="table-responsive">
                    {{ preprocessed_table|safe }}
                </div>
            </div>
        </div>

        <a href="/" class="btn btn-primary mt-3">Back to Home</a>
    </div>
</body>
</html>
